<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李云飞 | Portfolio Archive</title>
    <meta name="description" content="李云飞的个人作品集，聚焦研究、流程系统、产品原型与表达实践。">
    <link rel="icon" type="image/jpeg" href="个人照片/个人照片.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand-lockup">
                <span class="brand-mark"></span>
                <div>
                    <p class="brand-kicker">Portfolio Archive</p>
                    <h1>李云飞</h1>
                </div>
            </div>
            <nav class="site-nav" aria-label="页面导航">
                <a href="#selected-work">作品精选</a>
                <a href="#archive">全部目录</a>
                <a href="#contact">联系</a>
            </nav>
        </header>

        <main>
            <section class="hero">
                <div class="hero-copy">
                    <p id="hero-kicker" class="section-kicker"></p>
                    <h2 id="hero-title"></h2>
                    <p id="hero-intro" class="hero-text"></p>
                    <p id="hero-statement" class="hero-text hero-text--muted"></p>
                    <div class="hero-actions">
                        <a href="#selected-work" class="button button--solid">进入作品</a>
                        <a id="hero-resume" href="#" target="_blank" rel="noreferrer" class="button button--ghost">查看简历</a>
                    </div>
                </div>

                <div class="hero-portrait">
                    <div class="portrait-card">
                        <img id="portrait-image" class="portrait-image" src="" alt="">
                    </div>
                    <div class="portrait-note">
                        <p>目前关注</p>
                        <strong>AI 应用、数据流程、产品化表达</strong>
                    </div>
                </div>
            </section>

            <section class="overview-grid">
                <div class="overview-panel">
                    <div id="stats-grid" class="stats-grid"></div>
                </div>
                <div class="overview-panel">
                    <p class="panel-label">工作方法</p>
                    <ul id="notes-list" class="notes-list"></ul>
                </div>
                <div id="contact-panel" class="overview-panel"></div>
            </section>

            <section class="section-block" id="selected-work">
                <div class="section-heading">
                    <div>
                        <p class="section-kicker">Selected Work</p>
                        <h3>先看最能代表我的四组作品</h3>
                    </div>
                    <p class="section-summary">这些项目分别对应我最常切换的工作状态: 搭系统、做产品、做试验、做沉淀。</p>
                </div>
                <div id="featured-grid" class="featured-grid"></div>
            </section>

            <section class="section-block" id="archive">
                <div class="section-heading">
                    <div>
                        <p class="section-kicker">Archive</p>
                        <h3>全部目录</h3>
                    </div>
                    <p class="section-summary">按工作视角筛选，而不是按模板栏目名机械拆分。</p>
                </div>
                <div id="lens-row" class="lens-row" aria-label="作品视角筛选"></div>
                <div id="archive-list" class="archive-list"></div>
            </section>
        </main>

        <footer class="site-footer" id="contact">
            <div>
                <p class="section-kicker">Contact</p>
                <h3 id="footer-copy"></h3>
            </div>
            <div class="footer-actions">
                <a id="footer-mail" href="#" class="button button--solid">发送邮件</a>
                <a id="footer-resume" href="#" target="_blank" rel="noreferrer" class="button button--ghost">打开简历</a>
            </div>
        </footer>
    </div>

    <div id="modal-shell" class="modal-shell" hidden>
        <div id="modal-backdrop" class="modal-backdrop"></div>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <div>
                    <p id="modal-kicker" class="card-kicker"></p>
                    <h3 id="modal-title"></h3>
                    <p id="modal-description"></p>
                </div>
                <button id="modal-close" type="button" class="modal-close" aria-label="关闭弹窗">×</button>
            </div>
            <div class="modal-grid">
                <aside class="modal-sidebar">
                    <div id="modal-metrics" class="modal-meta"></div>
                    <div id="modal-asset-list" class="asset-list"></div>
                </aside>
                <div class="modal-content">
                    <div id="modal-preview"></div>
                    <div class="asset-detail">
                        <div class="asset-detail__header">
                            <div>
                                <p id="asset-type" class="card-kicker"></p>
                                <h4 id="asset-title"></h4>
                            </div>
                            <a id="asset-open" class="text-link" href="#" target="_blank" rel="noreferrer">打开源文件</a>
                        </div>
                        <p id="asset-description"></p>
                        <div id="asset-tags" class="tag-row"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data-v2.js"></script>
    <script src="app-v2.js"></script>
</body>
</html>
