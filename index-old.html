<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李云飞 · 个人作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="个人照片/个人照片.JPG">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 text-gray-800 min-h-screen">
    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-2 mb-4 md:mb-0">
                <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full"></div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                    李云飞 · 作品集
                </h1>
            </div>
            <div class="flex flex-wrap justify-center gap-4 md:gap-6">
                <button class="category-btn font-medium text-blue-600" data-category="all">全部</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="about">个人简介</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="project">项目展示</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="app">移动应用</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="learning">学习成果</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="paper">学术论文</button>
                <button class="category-btn font-medium text-gray-600 hover:text-blue-600" data-category="video">视频创作</button>
            </div>
        </div>
    </nav>

    <!-- 英雄区 -->
    <header class="container mx-auto px-4 py-12 md:py-20">
        <div class="flex flex-col md:flex-row items-center justify-between">
            <div class="md:w-1/2 mb-10 md:mb-0">
                <h2 class="text-4xl md:text-5xl font-bold mb-4">
                    你好，我是 <span class="text-blue-600">李云飞</span>
                </h2>
                <p class="text-xl text-gray-600 mb-6">
                    重庆大学学生，热衷于技术创新与产品开发。<br>
                    这里汇集了我的项目、学习成果和创作。
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#portfolio" class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold rounded-full shadow-lg hover:shadow-xl transition-shadow">
                        浏览作品
                    </a>
                    <a href="个人简历/重庆大学-李云飞-简历.pdf" target="_blank" class="px-6 py-3 border-2 border-blue-500 text-blue-600 font-semibold rounded-full hover:bg-blue-50 transition-colors">
                        下载简历
                    </a>
                </div>
            </div>
            <div class="md:w-1/3">
                <div class="relative">
                    <div class="w-64 h-64 rounded-full overflow-hidden border-8 border-white shadow-2xl">
                        <img src="个人照片/个人照片.JPG" alt="个人照片" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=个人照片'">
                    </div>
                    <div class="absolute -bottom-4 -right-4 bg-gradient-to-r from-green-400 to-blue-500 text-white p-4 rounded-2xl shadow-xl">
                        <div class="text-center">
                            <div class="text-2xl font-bold" id="item-count">0</div>
                            <div class="text-sm">个项目展示</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 作品集网格 -->
    <main id="portfolio" class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="portfolio-grid">
            <!-- 项目卡片将通过JavaScript动态生成 -->
        </div>
    </main>

    <!-- 模态框 -->
    <div id="modal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-auto">
            <div class="sticky top-0 bg-white border-b p-6 flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-bold" id="modal-title"></h3>
                    <p class="text-gray-600" id="modal-description"></p>
                </div>
                <button id="modal-close" class="text-3xl text-gray-400 hover:text-gray-700">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-8" id="modal-content">
                    <!-- 动态内容 -->
                </div>
                <div class="border-t pt-8">
                    <h4 class="text-xl font-bold mb-4">详细信息</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h5 class="font-semibold text-gray-700 mb-2">文件信息</h5>
                            <ul class="space-y-2" id="modal-info"></ul>
                        </div>
                        <div>
                            <h5 class="font-semibold text-gray-700 mb-2">操作</h5>
                            <div class="space-y-3" id="modal-actions"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-gradient-to-r from-gray-900 to-black text-white mt-20 py-12">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <h3 class="text-2xl font-bold mb-2">李云飞 · 个人作品集</h3>
                    <p class="text-gray-400">展示我的项目、学习和创作成果</p>
                </div>
                <div class="text-center md:text-right">
                    <p class="text-gray-400 mb-2">© <span id="current-year">2026</span> 版权所有</p>
                    <p class="text-gray-500 text-sm">
                        本页面为个人作品展示，仅用于求职面试等非商业用途。
                    </p>
                </div>
            </div>
            <div class="border-t border-gray-800 mt-8 pt-8 text-center text-gray-500 text-sm">
                <p>最后更新: 2026年3月24日 | 使用 HTML + Tailwind CSS + JavaScript 构建</p>
            </div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
